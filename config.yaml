# Step 15 扩展策略：
# 最终配置 = config.yaml + config.{APP_ENV}.yaml
# Step 1 仅提供基础业务配置，不实现多环境配置加载。

app:
  name: langchain-chat
  version: 0.1.0
  current_step: "Step 8  会话管理完善"

llm:
  default_model: example-chat-model
  available_models:
    - name: example-chat-model
      provider: example
      description: 默认教学示例模型，占位用途。
    - name: example-reasoning-model
      provider: example
      description: 后续多模型切换示例，占位用途。
  temperature: 0.7
  max_tokens: 2048
  timeout: 30
  max_retries: 3

storage:
  type: sqlite
  sqlite:
    database_path: data/sqlite/app.db
  mysql:
    host_env: MYSQL_HOST
    port_env: MYSQL_PORT
    user_env: MYSQL_USER
    password_env: MYSQL_PASSWORD
    database_env: MYSQL_DATABASE
  file:
    base_dir: data/users
    encoding: utf-8

conversation:
  title_max_length: 50

export:
  dir: data/users/{username}/exports
  filename_template: "{conversation_id}_{timestamp}.{format}"
