# Shared base configuration.
# Final runtime config = config.yaml + config.{APP_ENV}.yaml + environment variables.
app:
  name: langchain-chat
  version: 0.1.0
  current_step: "Step 15 多环境配置区分"

llm:
  default_model: default
  available_models:
    - alias: default
      display_name: 默认模型
      model: example-chat-model
      model_env: MODEL_NAME
      api_base_url_env: API_BASE_URL
      api_key_env: API_KEY
      provider: example
      description: 共享占位模型；实际运行由环境覆盖文件指定变量名。
    - alias: reasoning
      display_name: 推理模型
      model: example-reasoning-model
      model_env: REASONING_MODEL_NAME
      api_base_url_env: REASONING_API_BASE_URL
      api_key_env: REASONING_API_KEY
      provider: example
      description: 共享占位推理模型；实际运行由环境覆盖文件指定变量名。
  temperature: 0.7
  max_tokens: 2048
  timeout: 30
  max_retries: 3

storage:
  type: sqlite
  sqlite:
    database_path: data/sqlite/app.db
  mysql:
    host_env: MYSQL_HOST
    port_env: MYSQL_PORT
    user_env: MYSQL_USER
    password_env: MYSQL_PASSWORD
    database_env: MYSQL_DATABASE
    pool_min_size: 1
    pool_max_size: 5
  file:
    path: data/filestore
    encoding: utf-8

conversation:
  title_max_length: 50

export:
  dir: data/users/{username}/exports
  filename_template: "{conversation_id}_{timestamp}.{format}"
