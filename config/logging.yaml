version: 1
disable_existing_loggers: false

formatters:
  console:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  file:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(filename)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: console
    stream: ext://sys.stdout
  rotating_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: file
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers:
    - console
    - rotating_file

loggers:
  httpx:
    level: WARNING
    propagate: true
  urllib3:
    level: WARNING
    propagate: true
  langchain:
    level: WARNING
    propagate: true
  openai:
    level: WARNING
    propagate: true
