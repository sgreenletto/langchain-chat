version: 1
disable_existing_loggers: false

formatters:
  console:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    class: core.logging_utils.JsonLineFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: WARNING
    formatter: console
    stream: ext://sys.stderr
  json_file:
    class: logging.handlers.TimedRotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/app.log
    when: midnight
    interval: 1
    backupCount: 7
    encoding: utf-8
    utc: false

root:
  level: INFO
  handlers:
    - console
    - json_file

loggers:
  httpx:
    level: WARNING
    propagate: true
  httpcore:
    level: WARNING
    propagate: true
  urllib3:
    level: WARNING
    propagate: true
  langchain:
    level: WARNING
    propagate: true
  langsmith:
    level: WARNING
    propagate: true
  openai:
    level: WARNING
    propagate: true
